<!-- mado_loop.html | v0.16 | 2026-06-18 JST -->
<!--   v0.15→v0.16：長文をさらに追加。5級(Emmaの学校)・2級(食品ロス)・準2+(睡眠と健康)。パッセージ計12本・総計459問。 -->
<!--   方針：判定テストは全ジャンル公平に出題（苦手重点モードは採用しない）。 -->
<!--   v0.14→v0.15：長文をさらに追加。5級(Kenの一日)・2級(AI)・準2+(プラスチック問題)に長文読解を新設。パッセージ計9本・総計444問。 -->
<!--   v0.13→v0.14：長文パッセージを追加（計6本）。3級に内容一致型の作文・Eメール読解、4級・準2級にも長文読解を新設。総計430問。 -->
<!--   v0.12→v0.13：判定テスト結果に「苦手を鍛える」導線を追加。成績の先生へ送信（GAS連携）を統合。 -->
<!--   送信先=旧mado_drillと同じGAS_URL。?cls=3A&num=5&name=… と端末記憶で自動入力。 -->
<!--   v0.11→v0.12：苦手ジャンルの自動おすすめを追加。正答率データから「今日のおすすめ」カード＋苦手タイルに「苦手」バッジ。 -->
<!--   v0.10→v0.11：使える英語学（中学入学準備）を+10で計20問。4技能別問題を全級拡充。総計413問。 -->
<!--   v0.9→v0.10：レベルバーを全幅に拡張＋目盛り線追加。級間を4分割（3中間点）した連続位置でポインタ表示。 -->
<!--   数値は出さず「3級ギリ合格／3級＋α／4と3のあいだ／3級の手前」等の語で“あくまで目安”を視覚化（CSE換算は非公開のため不使用）。 -->
<!--   v0.8→v0.9：3級に「長文読解」ジャンルを新設。大問4・5の長文2本（放送委員Haruka／写真部Daiki）と抜き出し8問を統合。 -->
<!--   出題時にパッセージを上部表示。答えは本文中に実在する抜き出し型。総計375問。 -->
<!--   v0.7→v0.8：7・6・5・準2・準2+・2級も増量（MORE3）。全級バランス化。総計367問。 -->
<!--   v0.6→v0.7：3級・4級を中心に問題増量（MORE2）。3級70問・4級49問・全体250問。4技能別問題も拡充。 -->
<!--   v0.5→v0.6：「大問テクニック」を「4技能別問題」に改名し、メタ（解き方のコツ）を採点ジャンルから除去→実戦問題に。 -->
<!--   メタ学力は新モジュール「中学入学準備（使える英語学）」を6級と5級の間に新設し10問収録（級レベル判定には不使用）。 -->
<!--   級ごとに構成が異なってもOKなようavailableGenresで存在するジャンルのみ表示。 -->
<!--   v0.2→v0.3：準2級・準2級プラスを追加（全8級）。選択肢の表示順をランダム化（正答が①固定の罠を解消）。 -->
<!--   ヘッダに「いまの目安：英検◯級レベル」を直近の判定テスト結果から算出して表示。 -->
<!--   v0.1→v0.2：学校教材向けに配色・タイポ・余白を刷新。級/ジャンルごとのアクセント色、 -->
<!--   ソフトシャドウのカード、判定結果のリング表示、採点フィードバックのポップ演出を追加。 -->
<!--   英文フォントは可読性重視のサンセリフに変更（Comic Sans廃止）。prefers-reduced-motion対応。 -->
<!-- 「ジャンルごとに訓練」▶「英検級判定テスト」をループで回す英検トレーニングアプリ。 -->
<!--   フェーズ計画：①骨格づくり(本版) → ②UI/UX向上 → ③問題数増加。 -->
<!--   級：7・6・5・4・3・2級（7級/6級＝2027年1月新設予定。小学生向けCBT）。 -->
<!--   訓練ジャンル：単語／文法／大問テクニック／本番練習。ランダム出題→採点・解説→ジャンル別正答率。 -->
<!--   判定テスト：65%以上で合格（英検の判定基準を採用）。フルモード／クイックモードの2種。 -->
<!--   問題データは BANK[級][ジャンル] の配列。フェーズ③で各級の問題を増やす設計。 -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英検ループ訓練 ― 訓練▶判定テスト</title>
<style>
  :root{
    --jp:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic","Noto Sans JP",system-ui,sans-serif;
    --en:"Segoe UI","Helvetica Neue",Arial,system-ui,sans-serif;
    --ink:#1d2733; --muted:#5d6b7d; --hint:#8b97a6;
    --line:#e4e9f0; --line2:#eef2f7; --card:#ffffff; --bg:#eef2f8;
    --brand:#324a86; --brand2:#3f73c4; --brand-bg:#eaf0fb; --brand-ink:#2c4a8a;
    --ok:#1f9d6b; --ok-bg:#e7f6ef; --ng:#d65454; --ng-bg:#fdecec;
    --warn:#c98a00; --warn-bg:#fff6dd; --gold:#c08a1e;
    --shadow:0 1px 2px rgba(20,40,80,.04),0 8px 24px rgba(20,40,80,.06);
    --shadow-sm:0 1px 2px rgba(20,40,80,.05),0 2px 8px rgba(20,40,80,.05);
    --r:16px;
  }
  *{box-sizing:border-box;}
  body{margin:0;color:var(--ink);-webkit-text-size-adjust:100%;padding:18px 16px 40px;
    font-family:var(--jp);line-height:1.6;
    background:
      radial-gradient(1100px 460px at 50% -180px, #dde8fb 0%, rgba(221,232,251,0) 70%),
      var(--bg);}
  .wrap{max-width:780px;margin:0 auto;}
  .en{font-family:var(--en);}

  /* ヘッダ／ブランド */
  header{display:flex;align-items:center;gap:12px;margin:2px 2px 16px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{width:42px;height:42px;border-radius:13px;flex:0 0 auto;display:flex;align-items:center;
    justify-content:center;color:#fff;font-weight:800;font-size:21px;letter-spacing:.5px;
    background:linear-gradient(140deg,var(--brand2),var(--brand));box-shadow:0 6px 14px rgba(50,74,134,.28);}
  h1{font-size:21px;font-weight:800;margin:0;letter-spacing:.2px;}
  .tagline{font-size:12px;color:var(--muted);margin-top:1px;}
  .ver{font-size:11px;color:var(--hint);background:#fff;border:1px solid var(--line);
    padding:3px 9px;border-radius:999px;white-space:nowrap;align-self:flex-start;}
  /* 級レベルバー（7未満▶7▶…▶2級／青→黄→赤） */
  .levelbar{flex:1 1 auto;min-width:0;margin-left:18px;max-width:600px;}
  .levelbar .lb-cap{font-size:12px;font-weight:700;color:var(--brand-ink);text-align:right;margin-bottom:5px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .levelbar.none .lb-cap{color:var(--muted);font-weight:600;}
  .lb-track{position:relative;height:10px;border-radius:999px;
    background:linear-gradient(90deg,#2b59c3 0%,#3f8fd0 25%,#e9b21e 50%,#e0782f 75%,#d6453f 100%);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);}
  .lb-tick{position:absolute;top:1px;bottom:1px;width:2px;transform:translateX(-50%);
    background:rgba(255,255,255,.55);border-radius:1px;}
  .lb-pointer{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;
    background:#fff;border:2.5px solid var(--ink);box-shadow:0 1px 5px rgba(0,0,0,.35);
    transition:left .45s cubic-bezier(.3,.9,.3,1);z-index:2;}
  .lb-scale{position:relative;height:13px;margin-top:5px;}
  .lb-cell{position:absolute;top:0;font-size:9.5px;color:var(--hint);line-height:1.1;white-space:nowrap;}
  .lb-cell.on{color:var(--ink);font-weight:800;}
  .levelbar.none .lb-track{filter:grayscale(.55) opacity(.55);}
  @media(max-width:560px){.levelbar{max-width:100%;min-width:0;width:100%;flex-basis:100%;order:3;margin:10px 0 0;}
    .levelbar .lb-cap{text-align:center;}header{flex-wrap:wrap;}.ver{margin-left:auto;}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow);}
  .muted{color:var(--muted);} .hint{color:var(--hint);font-size:13px;}
  .sectlabel{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--muted);
    text-transform:none;margin-bottom:11px;display:flex;align-items:center;gap:7px;}
  .sectlabel .dot{width:7px;height:7px;border-radius:50%;background:var(--brand2);}

  /* ステップ表示（ループ） */
  .loop{display:flex;align-items:center;gap:6px;margin:0 2px 16px;}
  .loop .step{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:8px 6px;
    border-radius:12px;border:1px solid var(--line);background:#fff;font-size:13px;color:var(--muted);
    box-shadow:var(--shadow-sm);transition:.2s;}
  .loop .step .si{font-size:15px;}
  .loop .step.on{border-color:transparent;color:#fff;font-weight:700;
    background:linear-gradient(140deg,var(--brand2),var(--brand));box-shadow:0 6px 14px rgba(50,74,134,.25);}
  .loop .sep{color:var(--hint);font-size:13px;flex:0 0 auto;}

  /* 級セレクタ */
  .grades{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .gchip{position:relative;border:1px solid var(--line);background:#fff;border-radius:14px;
    padding:13px 9px 11px;text-align:center;cursor:pointer;transition:.18s;overflow:hidden;}
  .gchip::before{content:"";position:absolute;left:0;top:0;width:100%;height:4px;background:var(--gc);opacity:.85;}
  .gchip:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--gc);}
  .gchip.on{background:var(--gcb);border-color:var(--gc);box-shadow:var(--shadow);}
  .gchip .gn{font-size:20px;font-weight:800;color:var(--gc);line-height:1.1;}
  .gchip .gs{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.35;}
  .gchip .new{position:absolute;top:7px;right:7px;font-size:9px;font-weight:800;color:#fff;
    background:var(--gc);padding:1px 6px;border-radius:999px;letter-spacing:.04em;}

  /* 現在の級・大ボタン */
  .nowgrade{font-size:15px;font-weight:800;margin-bottom:3px;}
  .nowgrade b{color:var(--brand-ink);}

  /* ジャンルタイル */
  .genres{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .gtile{position:relative;border:1px solid var(--line);background:#fff;border-radius:14px;
    padding:14px 14px 13px;cursor:pointer;text-align:left;transition:.18s;box-shadow:var(--shadow-sm);}
  .gtile:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--tc);}
  .gtile .gi{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;
    justify-content:center;font-size:20px;background:var(--tcb);margin-bottom:9px;}
  .gtile .gl{font-size:16px;font-weight:800;}
  .gtile .gd{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;min-height:32px;}
  .accwrap{display:flex;align-items:center;gap:8px;margin-top:8px;}
  .accbar{flex:1;height:7px;border-radius:999px;background:var(--line2);overflow:hidden;}
  .accbar > i{display:block;height:100%;border-radius:999px;transition:width .5s ease;}
  .acclab{font-size:12px;font-weight:800;color:var(--ink);min-width:34px;text-align:right;}
  .acclab.none{color:var(--hint);font-weight:600;}
  .accsub{font-size:11px;color:var(--hint);margin-top:4px;}
  .gtile .weakbadge{position:absolute;top:10px;right:10px;font-size:9px;font-weight:800;color:#fff;
    background:#d65454;padding:2px 8px;border-radius:999px;letter-spacing:.04em;}

  /* 苦手ジャンルのおすすめ */
  .rec{display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-left:5px solid var(--rc,#d9803a);}
  .rec .rec-ico{font-size:26px;flex:0 0 auto;}
  .rec .rec-txt{flex:1 1 180px;min-width:0;}
  .rec .rec-h{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.05em;margin-bottom:3px;}
  .rec .rec-main{font-size:16px;font-weight:700;line-height:1.45;}
  .rec .rec-sub{font-size:13px;color:var(--muted);margin-top:3px;}
  .rec .act{white-space:nowrap;}

  /* 共通ボタン */
  .actions{margin-top:15px;display:flex;gap:10px;flex-wrap:wrap;}
  .act{font-family:var(--jp);font-size:16px;font-weight:700;padding:11px 20px;border-radius:11px;cursor:pointer;
    border:1px solid transparent;color:#fff;transition:.16s;line-height:1.3;
    background:linear-gradient(140deg,var(--brand2),var(--brand));box-shadow:0 6px 14px rgba(50,74,134,.22);}
  .act:hover{transform:translateY(-1px);box-shadow:0 9px 18px rgba(50,74,134,.26);}
  .act:active{transform:translateY(0);}
  .act.sec{background:#fff;color:var(--brand-ink);border-color:var(--line);box-shadow:var(--shadow-sm);}
  .act.sec:hover{border-color:var(--brand2);}
  .act.ghost{background:transparent;color:var(--muted);border-color:var(--line);box-shadow:none;}
  .act.ghost:hover{background:#fff;color:var(--ink);}
  .act.big{font-size:17px;padding:15px 22px;width:100%;justify-content:center;text-align:center;}
  .act:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none;}

  /* 訓練ヘッダ */
  .tbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
  .pill{font-size:13px;font-weight:700;padding:6px 13px;border:1px solid var(--line);border-radius:999px;
    background:#fff;cursor:pointer;color:var(--muted);transition:.15s;}
  .pill:hover{border-color:var(--pc);color:var(--pc);}
  .pill.on{border-color:transparent;background:var(--pc);color:#fff;}
  .stat{margin-left:auto;font-size:13px;color:var(--muted);}
  .stat b{color:var(--ink);font-size:14px;}

  /* 出題カード */
  .tech{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:800;color:var(--tc);
    background:var(--tcb);border-radius:999px;padding:5px 12px;margin-bottom:12px;}
  .prog{font-size:13px;color:var(--muted);margin-bottom:9px;font-weight:600;}
  .q{font-size:17px;margin-bottom:12px;line-height:1.55;font-weight:600;}
  .sent{font-family:var(--en);font-size:21px;line-height:1.65;margin:0 0 16px;color:#27313e;
    background:var(--brand-bg);border-radius:12px;padding:13px 16px;font-weight:600;}
  .choices{display:flex;flex-direction:column;gap:9px;}
  .ch{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);background:#fff;border-radius:12px;
    padding:12px 15px;cursor:pointer;font-size:17px;text-align:left;transition:.14s;width:100%;}
  .ch:hover{border-color:var(--brand2);background:#fafcff;}
  .ch .mk{flex:0 0 27px;height:27px;border-radius:8px;border:1.5px solid var(--line);display:flex;
    align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--muted);transition:.14s;}
  .ch .txt{flex:1;}
  .ch.en .txt{font-family:var(--en);}
  .ch.right{border-color:var(--ok);background:var(--ok-bg);}
  .ch.right .mk{border-color:var(--ok);background:var(--ok);color:#fff;}
  .ch.wrong{border-color:var(--ng);background:var(--ng-bg);}
  .ch.wrong .mk{border-color:var(--ng);background:var(--ng);color:#fff;}
  .ch.dim{opacity:.5;}

  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .lbl{font-size:16px;color:var(--muted);font-weight:700;}
  #ans{font-family:var(--en);font-size:22px;width:300px;max-width:100%;
    padding:9px 13px;border:1.5px solid var(--line);border-radius:11px;outline:none;transition:.15s;}
  #ans:focus{border-color:var(--brand2);box-shadow:0 0 0 4px var(--brand-bg);}
  #ans:disabled{background:#f4f6f9;}
  .sub{font-size:12px;color:var(--hint);margin:6px 0 0;}

  #fb{min-height:8px;margin-top:15px;}
  #fb .fbwrap{animation:pop .28s cubic-bezier(.2,.9,.3,1.2);}
  @keyframes pop{from{opacity:0;transform:translateY(6px) scale(.98);}to{opacity:1;transform:none;}}
  .verdict{font-size:18px;font-weight:800;display:flex;align-items:center;gap:7px;}
  .ok{color:var(--ok);} .ng{color:var(--ng);} .warn{color:var(--warn);}
  .ansrow{font-size:16px;margin-top:7px;}
  .ansrow .en{font-weight:800;font-size:19px;}
  .exp{font-size:15px;color:#3a4654;margin-top:10px;border-left:4px solid var(--brand2);
    padding:9px 14px;line-height:1.65;background:#f6f9fe;border-radius:0 10px 10px 0;}

  /* 長文読解パッセージ */
  .passage{background:#fbfcfe;border:1px solid var(--line);border-radius:12px;padding:12px 16px;
    margin-bottom:13px;max-height:240px;overflow:auto;box-shadow:inset 0 -10px 12px -12px rgba(0,0,0,.06);}
  .ptitle{font-size:13px;font-weight:800;color:var(--brand-ink);margin-bottom:7px;}
  .pbody{font-family:var(--en);font-size:15.5px;line-height:1.75;color:#2a2f34;}
  .pbody p{margin:0 0 8px;}
  .pnum{font-family:var(--jp);font-size:11px;color:var(--hint);margin-right:5px;}

  /* 判定テスト：進捗 */
  .ratebar{height:9px;border-radius:999px;background:var(--line2);overflow:hidden;margin:10px 0 4px;}
  .ratebar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--brand2),var(--brand));transition:width .35s ease;}

  /* 判定テスト結果 */
  .center{text-align:center;}
  .ring{width:172px;height:172px;border-radius:50%;margin:8px auto 4px;display:flex;align-items:center;
    justify-content:center;background:conic-gradient(var(--rc) calc(var(--p)*1%), var(--line2) 0);}
  .ring-hole{width:128px;height:128px;border-radius:50%;background:#fff;display:flex;flex-direction:column;
    align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px var(--line);}
  .ring-pct{font-size:38px;font-weight:800;line-height:1;color:var(--ink);}
  .ring-cap{font-size:12px;color:var(--muted);margin-top:3px;}
  .rscore{font-size:15px;color:var(--muted);margin:8px 0 2px;}
  .rscore b{color:var(--ink);font-size:17px;}
  .passmark{display:inline-flex;align-items:center;gap:8px;font-size:20px;font-weight:800;
    padding:10px 24px;border-radius:999px;margin:12px 0 4px;color:#fff;}
  .passmark.pass{background:linear-gradient(140deg,#27b07c,var(--ok));box-shadow:0 8px 18px rgba(31,157,107,.28);}
  .passmark.fail{background:linear-gradient(140deg,#e36b6b,var(--ng));box-shadow:0 8px 18px rgba(214,84,84,.24);}
  .threshold{font-size:13px;color:var(--hint);}
  .send-box{margin-top:18px;padding-top:16px;border-top:1px solid var(--line2);}
  .send-h{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:6px;}
  .rnum{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:4px 0 12px;}
  #scls,#sid,#snm{font-family:var(--jp);font-size:16px;width:92px;text-align:center;
    padding:9px 8px;border:1.5px solid var(--line);border-radius:10px;outline:none;}
  #snm{width:130px;}
  #scls:focus,#sid:focus,#snm:focus{border-color:var(--brand2);box-shadow:0 0 0 4px var(--brand-bg);}
  .rnote{font-size:12px;color:var(--hint);margin-top:10px;}

  .foot{text-align:center;font-size:11px;color:var(--hint);margin-top:18px;}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
  @media(max-width:520px){
    .sent{font-size:18px;}#ans{font-size:19px;width:100%;}h1{font-size:19px;}
    .genres{grid-template-columns:1fr;}.grades{grid-template-columns:repeat(3,1fr);}
    .gtile .gd{min-height:0;}.ch{font-size:16px;}.ring{width:152px;height:152px;}
    .ring-hole{width:114px;height:114px;}.ring-pct{font-size:33px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="brand-mark">英</div>
      <div>
        <h1>英検ループ訓練</h1>
        <div class="tagline">ジャンル訓練 → 判定テストで、合格へ。</div>
      </div>
    </div>
    <div class="levelbar none" id="levelbar"></div>
    <span class="ver" id="ver">v0.2</span>

  /* ============================ 採点ユーティリティ ============================ */
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function enHTML(s){return esc(s).replace(/Y/g,'<span class="y">Y</span>');}
  function normSpell(x){return (x||"").toLowerCase().replace(/[’']/g,"").replace(/[^a-z]+/g," ").trim().replace(/\s+/g," ");}
  function normExact(x){return (x||"").trim().replace(/[\/／　]+/g," ").replace(/\s+/g," ");}
  // fill判定: "ok"(完全一致) / "warn"(綴りはOKだが記号・大文字ずれ) / "ng" / null(空)
  function judgeFill(u,q){
    var alts=q.ac?[q.a].concat(q.ac):[q.a];
    var ue=normExact(u), us=normSpell(u);
    if(us==="")return null;
    var spell=false;
    for(var i=0;i<alts.length;i++){
      if(normExact(alts[i]).toLowerCase()===ue.toLowerCase())return "ok";
      if(normSpell(alts[i])===us)spell=true;
    }
    return spell?"warn":"ng";
  }

  /* ============================ 成績の記録（端末保存） ============================ */
  var STATS_KEY="mado_loop_stats_v1", GRADE_KEY="mado_loop_grade_v1";
  function loadStats(){try{return JSON.parse(localStorage.getItem(STATS_KEY))||{};}catch(e){return {};}}
  function saveStats(s){try{localStorage.setItem(STATS_KEY,JSON.stringify(s));}catch(e){}}
  function record(grade,genre,ok){
    var s=loadStats();
    s[grade]=s[grade]||{}; s[grade][genre]=s[grade][genre]||{n:0,ok:0};
    s[grade][genre].n++; if(ok)s[grade][genre].ok++; saveStats(s);
  }
  function acc(grade,genre){
    var s=loadStats(), g=s[grade]&&s[grade][genre];
    if(!g||!g.n)return null;
    return {pct:Math.round(g.ok/g.n*100), n:g.n, ok:g.ok};
  }
  // 苦手ジャンルの自動おすすめ：正答率データから次にやるべきジャンルを判定
  function recommendGenre(grade){
    var list=availableGenres(grade).map(function(ge){var a=acc(grade,ge.id);
      return {ge:ge, n:a?a.n:0, pct:a?a.pct:null};});
    if(!list.length) return {type:"none"};
    var untried=list.filter(function(x){return x.n===0;});
    var enough =list.filter(function(x){return x.n>=3;}).sort(function(a,b){return a.pct-b.pct;});
    if(enough.length && enough[0].pct<80) return {type:"weak", ge:enough[0].ge, pct:enough[0].pct};
    if(untried.length) return {type:"untried", ge:untried[0].ge};
    var few=list.filter(function(x){return x.n>0 && x.n<3;}).sort(function(a,b){return a.n-b.n;});
    if(few.length) return {type:"more", ge:few[0].ge};
    return {type:"good"};
  }

  /* ---- 実力レベルの目安（直近の判定テスト結果から算出） ---- */
  var LASTTEST_KEY="mado_loop_lasttest_v1";
  var LEVEL_ORDER=["7","6","5","4","3","pre2","pre2plus","2"]; // 易→難
  function saveLastTest(o){try{localStorage.setItem(LASTTEST_KEY,JSON.stringify(o));}catch(e){}}
  function loadLastTest(){try{return JSON.parse(localStorage.getItem(LASTTEST_KEY));}catch(e){return null;}}
  var LEVEL_BAR_LABELS=["7未満","7級","6級","5級","4級","3級","準2級","準2+","2級"]; // 9メモリ（バー座標0〜8）
  // 直近の判定テストから、バー座標 L（0〜8の連続値・0.25刻みに丸め）を求める。
  //   合格：その級メモリ〜+0.75（満点で次級の「手前」まで）。不合格：その級の-0.25〜-0.75（手前〜下の級+α）。
  //   ※数値は一切表示しない。あくまで視覚的な「目安」。
  function levelCoord(){
    var lt=loadLastTest(); if(!lt) return null;
    var m=LEVEL_ORDER.indexOf(lt.grade); if(m<0) return null; // 級判定対象外（prep等）は無視
    var bar=m+1;                                   // バー座標（0=7未満なので+1）
    var L;
    if(lt.pass){ L=bar + Math.min(Math.max((lt.pct-65)/35,0),1)*0.75; }
    else       { L=bar - 0.25 - Math.min(Math.max((65-lt.pct)/65,0),1)*0.5; }
    L=Math.round(L*4)/4;                            // 0.25刻みにスナップ（離散的な「段」の感覚に）
    return Math.min(Math.max(L,0),8);
  }
  function levelCaption(L){
    if(L==null) return "まだ判定なし — 判定テストで力をはかろう";
    if(L<1)     return "いまの目安：英検7級にチャレンジ中";
    if(L>=8)    return "いまの目安：英検2級レベル（合格圏）";
    var lb=LEVEL_BAR_LABELS, i=Math.floor(L+1e-9), f=L-i;
    if(f<0.125) return "いまの目安：英検"+lb[i]+"ギリ合格";
    if(f<0.375) return "いまの目安：英検"+lb[i]+" ＋α";
    if(f<0.625) return "いまの目安：英検"+lb[i]+"と"+lb[i+1]+"の あいだ";
    return "いまの目安：英検"+lb[i+1]+"の手前";
  }
  function updateLevelChip(){
    var el=document.getElementById("levelbar"); if(!el) return;
    var L=levelCoord();
    var nearest = (L==null)? -1 : Math.round(L);
    var ticks="", scale="";
    for(var i=0;i<9;i++){
      ticks+='<span class="lb-tick" style="left:'+(i/8*100)+'%"></span>';
      var tf = i===0?'translateX(0)':(i===8?'translateX(-100%)':'translateX(-50%)');
      scale+='<span class="lb-cell'+(i===nearest?' on':'')+'" style="left:'+(i/8*100)+'%;transform:'+tf+'">'+esc(LEVEL_BAR_LABELS[i])+'</span>';
    }
    var pointer = (L==null)? '' : '<span class="lb-pointer" style="left:'+(L/8*100).toFixed(2)+'%"></span>';
    el.className="levelbar"+(L==null?" none":"");
    el.innerHTML='<div class="lb-cap">'+esc(levelCaption(L))+'</div>'+
                 '<div class="lb-track">'+ticks+pointer+'</div>'+
                 '<div class="lb-scale">'+scale+'</div>';
  }

  function pickQuestion(){

    var last=S.recent[S.grade+"/"+S.genre];

    if(pool.length>1 && idx===last){idx=(idx+1)%pool.length;}

    S.q=pool[idx]; S.picked=-1; S.answered=false;

  /* ============================ 判定テスト ============================ */

  function gradePool(grade){

  }

  function renderTestSetup(){
    setLoop("test");
    var gm=gradeMeta(S.grade), pool=gradePool(S.grade);
    var quick=Math.min(QUICK_N,pool.length);
    app.innerHTML=''+
    '<div class="card center">'+
      '<div class="sectlabel" style="justify-content:center;color:var(--brand-ink);font-size:16px;margin-bottom:8px;">📋 '+esc(gm.name)+' 判定テスト</div>'+
      '<div class="hint" style="margin-bottom:16px;">英検の判定基準にならい、<b>正答率65%以上で合格</b>。モードをえらんでね。</div>'+
      '<button class="act big" id="mFull">フルモード（全'+pool.length+'問）</button>'+
      '<div class="hint" style="margin:6px 0 14px;">本番に近い問題数。じっくり実力を判定。</div>'+
      '<button class="act sec big" id="mQuick">クイックモード（'+quick+'問）</button>'+
      '<div class="hint" style="margin-top:6px;">少しずつ出題。短時間でサッと判定。</div>'+
    '</div>'+
    '<div class="actions"><button class="act ghost" id="backHome2">← ホーム</button></div>';
    $("mFull").addEventListener("click",function(){startTest("full");});
    $("mQuick").addEventListener("click",function(){startTest("quick");});
    $("backHome2").addEventListener("click",function(){go("home");});
  }

  function startTest(mode){
    var pool=shuffle(gradePool(S.grade).slice());
    if(mode==="quick")pool=pool.slice(0,Math.min(QUICK_N,pool.length));
    S.test={mode:mode, queue:pool, idx:0, ok:0};
    go("test");
  }

  function renderTest(){
    setLoop("test");
    var t=S.test;
    if(t.idx>=t.queue.length){return renderTestResult();}
    S.q=t.queue[t.idx]; S.answered=false; S.picked=-1;
    var gm=gradeMeta(S.grade);
    app.innerHTML=''+
    '<div class="card">'+
      '<div class="prog">'+esc(gm.name)+' 判定テスト（'+(t.mode==="quick"?"クイック":"フル")+'）　'+(t.idx+1)+' / '+t.queue.length+'</div>'+
      '<div class="ratebar"><i style="width:'+Math.round(t.idx/t.queue.length*100)+'%"></i></div>'+
      (S.q.p?renderPassage(S.q.p):'')+
      '<div class="q" style="margin-top:10px;">'+esc(S.q.q||"")+'</div>'+
      (S.q.en?'<div class="sent">'+enHTML(S.q.en)+'</div>':'')+
      renderInput(S.q)+
      '<div id="fb"></div>'+
      '<div class="actions" id="tactions"></div>'+
    '</div>';
    bindQuestion(S.q,/*isTest*/true);
  }

  // テスト：採点後（解説は出すが正答率には加算＝学習も兼ねる）
  function testAnswered(ok, kind, ansHTML){
    if(ok)S.test.ok++;
    record(S.grade, currentGenreOf(S.q), ok); // ジャンル別正答率にも反映
    var v = kind==="ok" ? '<div class="verdict ok">○　正解！</div>'
          : kind==="warn" ? '<div class="verdict warn">△　惜しい（綴りはOK・記号ミス）</div>'
          : '<div class="verdict ng">✕　ちがうよ</div>';
    var exp=S.q.ex?'<div class="exp">'+enHTML(S.q.ex)+'</div>':'';
    $("fb").innerHTML='<div class="fbwrap">'+v+'<div class="ansrow">'+ansHTML+'</div>'+exp+'</div>';
    var wrap=$("tactions"); wrap.innerHTML='';
    var last=(S.test.idx>=S.test.queue.length-1);
    var nx=document.createElement("button"); nx.className="act"; nx.textContent=last?"結果を見る →":"次へ →";
    nx.addEventListener("click",function(){S.test.idx++;go("test");});
    wrap.appendChild(nx);
  }
  // テスト用：問題がどのジャンル由来か（正答率記録のため）
  function currentGenreOf(q){
    var b=BANK[S.grade];
    for(var k=0;k<GENRES.length;k++){
      var arr=b[GENRES[k].id]||[];
      if(arr.indexOf(q)>=0)return GENRES[k].id;
    }
    return "practice";
  }

  // ---- 成績を先生に送信（GAS連携） ----
  // ★先生へ：mado_score_gas のウェブアプリURLを下に貼ると有効になります（?cls=3A&num=5&name=… で自動入力）。
  var GAS_URL="https://script.google.com/macros/s/AKfycbxzR0bVxi_SV8d3hKbOSPnZZ1KLI0Ye_1y5w2wo0vPE0o6vvd8lvtiwPPF8wLyzn5Wiwg/exec";
  function idStore(k,v){try{localStorage.setItem("mado_"+k,v);}catch(e){}}
  function idLoad(k){try{return localStorage.getItem("mado_"+k)||"";}catch(e){return "";}}
  function fillIdentity(){
    var prm; try{prm=new URLSearchParams(location.search);}catch(e){prm=null;}
    var c=$("scls"),n=$("sid"),m=$("snm"); if(!c)return;
    c.value=(prm&&prm.get("cls"))||idLoad("cls")||"";
    n.value=(prm&&prm.get("num"))||idLoad("num")||"";
    m.value=(prm&&prm.get("name"))||idLoad("name")||"";
  }
  function sendScore(){
    var r=S.lastResult||{}, msg=$("sendmsg");
    var cls=$("scls").value.trim(), num=$("sid").value.trim(), name=$("snm").value.trim();
    if(!cls||!num){msg.textContent="組と番号を入れてね";return;}
    if(!GAS_URL){msg.textContent="（先生へ：HTML内の GAS_URL が未設定です）";return;}
    idStore("cls",cls); idStore("num",num); idStore("name",name);
    var btn=$("send"); btn.disabled=true; btn.textContent="送信中…";
    var payload={cls:cls,num:num,name:name,ver:APP_VER,
      grade:(gradeMeta(r.grade)?gradeMeta(r.grade).name:r.grade),
      mode:(r.mode==="quick"?"クイック":"フル"),
      score:r.score,total:r.total,pct:r.pct,pass:(r.pass?"合格":"不合格"),
      ok:r.score,warn:0,ng:(r.total-r.score)};
    fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)})
      .then(function(res){return res.json();})
      .then(function(j){ if(j&&j.result==="ok"){btn.textContent="送信OK ✓";msg.textContent="記録できたよ！おつかれさま。";}
        else{throw new Error((j&&j.message)||"server error");} })
      .catch(function(err){ btn.disabled=false; btn.textContent="先生に送信";
        msg.textContent="送信できなかった…電波を確認してもう一度。（"+String(err).slice(0,40)+"）"; });
  }

  function renderTestResult(){
    setLoop("test");
    var t=S.test, gm=gradeMeta(S.grade);
    var total=t.queue.length, pct=total?Math.round(t.ok/total*100):0;
    var pass=(t.ok/total)>=PASS;
    if(LEVEL_ORDER.indexOf(S.grade)>=0) saveLastTest({grade:S.grade, pct:pct, pass:pass, ts:Date.now()});
    S.lastResult={grade:S.grade, score:t.ok, total:total, pct:pct, pass:pass, mode:t.mode};
    var rec=recommendGenre(S.grade);
    var primary = (rec.type==="weak")
      ? '<button class="act" id="rWeak" data-g="'+rec.ge.id+'" style="background:'+rec.ge.c+';border-color:'+rec.ge.c+'">🎯 苦手な'+rec.ge.name+'を鍛える →</button>'
      : '<button class="act" id="rTrain">🏋️ 訓練にもどる</button>';
    app.innerHTML=''+
    '<div class="card center">'+
      '<div class="sectlabel" style="justify-content:center;color:var(--brand-ink)">'+esc(gm.name)+' 判定テスト 結果</div>'+
      '<div class="ring" style="--p:'+pct+';--rc:'+(pass?'var(--ok)':'var(--ng)')+'">'+
        '<div class="ring-hole"><div class="ring-pct">'+pct+'%</div><div class="ring-cap">正答率</div></div>'+
      '</div>'+
      '<div class="rscore">正解 <b>'+t.ok+'</b> / '+total+' 問</div>'+
      '<div class="passmark '+(pass?'pass':'fail')+'">'+(pass?'🎉 合格ライン突破！':'あと少し… 不合格')+'</div>'+
      '<div class="threshold">合格基準：正答率65%以上（'+Math.ceil(total*PASS)+'問以上の正解で合格）</div>'+
      (rec.type==="weak"?'<div class="hint" style="margin-top:10px;">いまの苦手は <b style="color:'+rec.ge.c+'">'+esc(rec.ge.name)+'</b>（正答率 '+rec.pct+'%）。鍛えてもう一度ループを回そう。</div>':'')+
      '<div class="actions" style="justify-content:center;margin-top:14px;">'+
        primary+
        '<button class="act sec" id="rRetry">📋 もう一度テスト</button>'+
        '<button class="act ghost" id="rHome">🏠 ホーム</button>'+
      '</div>'+
      '<div class="send-box">'+
        '<div class="send-h">📨 成績を先生に送信</div>'+
        '<div class="rnum">'+
          '<input id="scls" type="text" autocomplete="off" placeholder="組(例:3A)" aria-label="組">'+
          '<input id="sid" type="text" inputmode="numeric" autocomplete="off" placeholder="番号" aria-label="番号">'+
          '<input id="snm" type="text" autocomplete="off" placeholder="名前" aria-label="名前">'+
        '</div>'+
        '<button class="act" id="send">先生に送信</button>'+
        '<div class="rnote" id="sendmsg">組・番号・名前を入れて「先生に送信」を押してね</div>'+
      '</div>'+
    '</div>';
    var rw=$("rWeak"); if(rw)rw.addEventListener("click",function(){S.q=null;S.genre=this.getAttribute("data-g");go("train");});
    var rt=$("rTrain"); if(rt)rt.addEventListener("click",function(){S.q=null;go("train");});
    $("rRetry").addEventListener("click",function(){go("testsetup");});
    $("rHome").addEventListener("click",function(){go("home");});
    $("send").addEventListener("click",sendScore);
    fillIdentity();
  }

  /* ============================ ルーター ============================ */
  function go(screen){
    S.screen=screen;
    if(screen==="home")renderHome();
    else if(screen==="train")renderTrain();
    else if(screen==="testsetup")renderTestSetup();
    else if(screen==="test")renderTest();
    else if(screen==="testresult")renderTestResult();
    updateLevelChip();
  }

  document.getElementById("ver").textContent=APP_VER;
  go("home");
})();
</script>
</body>
</html>
